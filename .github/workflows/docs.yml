# Build the mkdocs-material site and publish it to GitHub Pages.
# One-time setup: repository Settings -> Pages -> Source: "GitHub Actions".

name: Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with docs extras
        run: python -m pip install -e ".[docs]"

      - name: Build site
        run: mkdocs build

      # The landing page replaces the generated docs home at the site root;
      # every other docs URL is untouched. Docs remain reachable through the
      # landing's "Get started" / nav links.
      - name: Overlay landing page at the site root
        run: cp landing/index.html site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
